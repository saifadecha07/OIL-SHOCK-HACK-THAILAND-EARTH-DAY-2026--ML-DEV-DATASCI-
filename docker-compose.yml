services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: shockwave-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shockwave}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shockwave}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ml-trainer:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ./ml_engine/Dockerfile
    container_name: shockwave-ml-trainer
    working_dir: /app
    environment:
      EIA_API_KEY: ${EIA_API_KEY:-YOUR_EIA_API_KEY}
      DOEB_IMPORT_PATH: ${DOEB_IMPORT_PATH:-/app/ml_engine/data/raw/doeb_import.csv}
      DOEB_DIESEL_PATH: ${DOEB_DIESEL_PATH:-/app/ml_engine/data/raw/doeb_diesel.csv}
      EPPO_MONTHLY_PATH: ${EPPO_MONTHLY_PATH:-}
      MODEL_COUNTRY: ${MODEL_COUNTRY:-Thailand}
      EIA_START: ${EIA_START:-2014-01}
      MAX_GRANGER_LAG: ${MAX_GRANGER_LAG:-6}
      MAX_VAR_LAG: ${MAX_VAR_LAG:-12}
      BACKTEST_STEPS: ${BACKTEST_STEPS:-3}
      MIN_TRAINING_ROWS: ${MIN_TRAINING_ROWS:-36}
    volumes:
      - .:/app

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: shockwave-backend
    ports:
      - "${APP_PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8000}
      EIA_API_KEY: ${EIA_API_KEY:-YOUR_EIA_API_KEY}
      ALLOW_MOCK_MODEL: ${ALLOW_MOCK_MODEL:-true}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-false}
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_SERVER: ${POSTGRES_SERVER:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shockwave}
      BACKEND_CORS_ORIGINS: '["http://localhost:8000","http://127.0.0.1:8000","http://localhost:8501","http://127.0.0.1:8501"]'
    restart: unless-stopped

  frontend:
    profiles: ["standalone-frontend"]
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: shockwave-frontend
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    restart: unless-stopped

volumes:
  postgres-data:
